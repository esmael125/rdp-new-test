name: RDP-LOOPHOLE-STABLE

on:
  workflow_dispatch:

jobs:
  setup-rdp:
    runs-on: windows-latest
    steps:
    - name: Configure Windows
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

    - name: Set Password
      run: |
        $Password = ConvertTo-SecureString "${{ secrets.RDP_PASSWORD }}" -AsPlainText -Force
        Set-LocalUser -Name "runneradmin" -Password $Password

    - name: Setup Loophole
      run: |
        Invoke-WebRequest https://github.com/loophole/cli/releases/download/1.0.0-beta.15/loophole_windows_64bit.zip -OutFile loophole.zip
        Expand-Archive loophole.zip -DestinationPath .

    - name: Start Loophole Tunnel
      run: |
        # تشغيل النفق لمنفذ RDP 3389
        Start-Process .\loophole.exe -ArgumentList "tcp 3389 --nopass Name=karim-rdp" -WindowStyle Hidden
        Start-Sleep -Seconds 30

    - name: Get Address
      run: |
        Write-Host "------------------------------------"
        Write-Host "CONNECT TO: karim-rdp.loophole.host"
        Write-Host "PORT: (Check Loophole Terminal if needed)"
        Write-Host "USERNAME: runneradmin"
        Write-Host "------------------------------------"
        Write-Host "If the above host doesn't work directly, check the logs below:"
        ./loophole.exe --version

    - name: Keep Online
      run: Start-Sleep -Seconds 21600
