name: NGROK-RDP

on:
  workflow_dispatch:

jobs:
  setup-rdp:
    runs-on: windows-latest
    steps:
    - name: Enable Remote Desktop
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

    - name: Update User Password
      run: |
        $Password = ConvertTo-SecureString "${{ secrets.RDP_PASSWORD }}" -AsPlainText -Force
        # تحديث كلمة السر للمستخدم الموجود وتفعيله
        Set-LocalUser -Name "runneradmin" -Password $Password
        Write-Host "Password for runneradmin has been updated successfully."

    - name: Download and Setup Ngrok
      run: |
        Invoke-WebRequest https://bin.equinox.io/c/b34edq6ii9y/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip
        Expand-Archive ngrok.zip
        .\ngrok\ngrok.exe config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"

    - name: Start Ngrok Tunnel
      run: |
        Start-Process .\ngrok\ngrok.exe -ArgumentList "tcp 3389"
        Start-Sleep -Seconds 15

    - name: Get RDP Address
      run: |
        $response = Invoke-RestMethod -Uri http://localhost:4040/api/tunnels
        $address = $response.tunnels[0].public_url
        $cleanAddress = $address.Replace("tcp://", "")
        Write-Host "--------------------------------------------------------"
        Write-Host "Connect to RDP using this address: $cleanAddress"
        Write-Host "Username: runneradmin"
        Write-Host "--------------------------------------------------------"

    - name: Keep Alive
      run: Start-Sleep -Seconds 21600
