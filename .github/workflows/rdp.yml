name: RDP-NGROK-FINAL-VERSION

on:
  workflow_dispatch:

jobs:
  setup-rdp:
    runs-on: windows-latest
    steps:
    - name: Configure Windows
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

    - name: Set Password
      run: |
        $Password = ConvertTo-SecureString "${{ secrets.RDP_PASSWORD }}" -AsPlainText -Force
        Set-LocalUser -Name "runneradmin" -Password $Password

    - name: Install Ngrok
      run: choco install ngrok -y

    - name: Auth and Start Ngrok
      run: |
        ngrok config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"
        # تشغيل ngrok في نافذة منفصلة لضمان استمراره
        Start-Process ngrok -ArgumentList "tcp 3389" -WindowStyle Hidden
        # انتظر 45 ثانية كاملة لضمان فتح النفق
        Start-Sleep -Seconds 45

    - name: Get Address
      run: |
        # محاولة الحصول على البيانات مع تكرار المحاولة إذا فشلت
        $MaxRetries = 5
        $RetryCount = 0
        $Success = $false
        while (-not $Success -and $RetryCount -lt $MaxRetries) {
            try {
                $query = Invoke-RestMethod -Uri http://localhost:4040/api/tunnels
                $url = $query.tunnels[0].public_url
                $clean = $url.Replace("tcp://", "")
                Write-Host "------------------------------------"
                Write-Host "SUCCESS! CONNECT TO: $clean"
                Write-Host "------------------------------------"
                $Success = $true
            } catch {
                $RetryCount++
                Write-Host "Waiting for Ngrok to start... (Attempt $RetryCount)"
                Start-Sleep -Seconds 10
            }
        }
        if (-not $Success) { throw "Ngrok failed to start in time." }

    - name: Keep Online
      run: Start-Sleep -Seconds 21600
