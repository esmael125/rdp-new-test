name: RDP-FINAL-STABLE

on:
  workflow_dispatch:

jobs:
  setup-rdp:
    runs-on: windows-latest
    steps:
    - name: Enable RDP
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 1

    - name: Set Admin Password
      run: |
        $Password = ConvertTo-SecureString "${{ secrets.RDP_PASSWORD }}" -AsPlainText -Force
        Set-LocalUser -Name "runneradmin" -Password $Password

    - name: Download & Install Ngrok
      run: |
        # استخدام Chocolatey المثبت مسبقاً في GitHub لضمان التحميل من مصدر موثوق
        choco install ngrok -y

    - name: Authenticate Ngrok
      run: |
        ngrok config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"

    - name: Open RDP Tunnel
      run: |
        # تشغيل النفق في الخلفية مع توفير وقت كافٍ للانطلاق
        Start-Process ngrok -ArgumentList "tcp 3389" -WindowStyle Hidden
        Start-Sleep -Seconds 60

    - name: Display Connection Details
      run: |
        $ErrorActionPreference = 'SilentlyContinue'
        $query = Invoke-RestMethod -Uri http://localhost:4040/api/tunnels
        if ($query) {
            $url = $query.tunnels[0].public_url
            $cleanAddress = $url.Replace("tcp://", "")
            Write-Host "------------------------------------------------"
            Write-Host "CONGRATULATIONS! CONNECT TO: $cleanAddress"
            Write-Host "USERNAME: runneradmin"
            Write-Host "------------------------------------------------"
        } else {
            Write-Host "Ngrok is still starting, checking again..."
            Start-Sleep -Seconds 20
            $query = Invoke-RestMethod -Uri http://localhost:4040/api/tunnels
            $url = $query.tunnels[0].public_url
            $cleanAddress = $url.Replace("tcp://", "")
            Write-Host "CONNECT TO: $cleanAddress"
        }

    - name: Keep Runner Alive
      run: Start-Sleep -Seconds 21600
